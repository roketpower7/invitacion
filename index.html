<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Gender Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Dancing Script', cursive;
            background-color: #fdf2f8; 
            text-align: center;
            color: #5d4037; 
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 450px;
            margin: auto;
            border-radius: 20px;
            padding: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid #fbcfe8; 
            position: relative; 
        }

        h1 {
            color: #5d4037;
            font-size: 3.5em; /* Ajustado para que quepa bien */
            margin: 30px 0 20px; 
        }

        /* --- SISTEMA DE ENMARCADO DE IMÁGENES --- */
        .framed-image {
            position: absolute;
            object-fit: contain;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); 
        }

        .boy-boy { 
            top: 10px;
            left: 10px;
            width: 70px;
            transform: rotate(-10deg);
            z-index: 1;
        }

        .bear-pink { 
            top: 10px;
            right: 10px;
            width: 70px;
            transform: rotate(20deg);
            z-index: 1;
        }

        .girl-baby { 
            bottom: 80px;
            left: -20px; 
            width: 90px;
            transform: rotate(5deg);
            z-index: 2;
        }

        .bear-blue { 
            bottom: 80px;
            right: -20px;
            width: 90px;
            transform: rotate(-5deg);
            z-index: 2;
        }
        /* --- FIN DEL SISTEMA DE ENMARCADO --- */

        .info {
            margin: 15px 40px; 
            font-size: 1.2em;
            line-height: 1.5;
        }

        /* --- NUEVO ESTILO PARA NIÑAS O NIÑOS --- */
        .pregunta-genero {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Espacio entre las palabras */
            margin: 20px 0;
        }

        .texto-nina {
            font-size: 2.8em;
            color: #FFC5D3; /* Rosa */
            font-weight: bold;
        }

        .texto-o {
            font-size: 2em;
            color: #5d4037; /* Marrón */
        }

        .texto-nino {
            font-size: 2.8em;
            color: #B3EBF2; /* Azul */
            font-weight: bold;
        }
        /* --- FIN --- */

        /* --- ESTILO PARA EL ULTRASONIDO --- */
        .framed-ultrasound {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin: 20px auto 30px; /* Margen para espacio visual */
            border-radius: 15px; /* Bordes redondeados */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Sombra suave */
            display: block; /* Para centrado perfecto */
            object-fit: contain;
        }
        /* --- FIN ESTILO --- */

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-rsvp {
            background-color: #ec4899; 
            color: white;
        }

        .btn-map {
            background-color: #3b82f6; 
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>It's Twins!</h1>

        <img src="image_9.png" class="framed-image bear-pink" alt="Oso con globos rosas y cafés">
        <img src="image_11.png" class="framed-image bear-blue" alt="Oso con globos azules">
        <img src="image_8.png" class="framed-image girl-baby" alt="Bebé niña">
        <img src="image_10.png" class="framed-image boy-boy" alt="Bebé niño">
        
        <p class="info">¡Es una sorpresa que no podemos esperar a compartir contigo!</p>
        
        <div class="pregunta-genero">
            <span class="texto-nina">¿niñas</span>
            <span class="texto-o">o</span>
            <span class="texto-nino">niños?</span>
        </div>

        <p class="info">Sábado, 11 de Abril<br>4:00 PM</p>
        <p class="info">Lugar: 4050 Pendleton Drive 77802<br>(Área de alberca)</p>
        
        <img src="ultrasonido.jpg" class="framed-ultrasound" alt="Nuestra Primera Foto Juntos">

        <div class="button-group">
            <a href="https://wa.me/19796613787" class="btn btn-rsvp">Confirmar Asistencia</a>
            <a href="https://maps.google.com/" class="btn btn-map">Ver Mapa</a>
        </div>
    </div>
</body>
</html>
