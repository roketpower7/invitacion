<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Gender Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Dancing Script', cursive;
            background-color: #fdf2f8; /* Mismo rosa muy pálido */
            text-align: center;
            color: #5d4037; /* Mismo marrón */
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 450px;
            margin: auto;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px solid #fbcfe8; /* Mismo rosa */
        }

        h1 {
            color: #5d4037;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        /* --- NUEVO SISTEMA DE CAPAS PARA IMÁGENES --- */
        .composition-area {
            position: relative;
            height: 300px; /* Altura para contener las imágenes escalonadas */
            width: 100%;
            margin-bottom: 20px;
        }

        .composition-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            pointer-events: none; /* Las imágenes no interfieren con el clic */
        }

        .composition-item {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        /* Posiciones específicas para crear capas */
        .item-mixed-bear { /* Oso globos mixtos (image_9.png) - Fondo Izquierda */
            grid-column: 1;
            grid-row: 1;
            transform: translate(-15px, -15px) rotate(-5deg);
            filter: blur(0.5px); /* Desenfoque sutil para el fondo */
            opacity: 0.8;
            z-index: 1;
        }

        .item-blue-bear { /* Oso globos azules (image_11.png) - Fondo Derecha */
            grid-column: 2;
            grid-row: 1;
            transform: translate(15px, -15px) rotate(5deg);
            filter: blur(0.5px);
            opacity: 0.8;
            z-index: 1;
        }

        .item-girl { /* Bebé niña (image_8.png) - Primer plano Izquierda */
            grid-column: 1;
            grid-row: 2;
            transform: translate(0, 0) scale(1.1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); /* Sombra fuerte para profundidad */
            z-index: 2;
        }

        .item-boy { /* Bebé niño (image_10.png) - Primer plano Derecha */
            grid-column: 2;
            grid-row: 2;
            transform: translate(0, 0) scale(1.1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            z-index: 2;
        }
        /* --- FIN DEL SISTEMA DE CAPAS --- */

        .info {
            margin: 20px 0;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-rsvp {
            background-color: #ec4899; /* Mismo rosa original */
            color: white;
        }

        .btn-map {
            background-color: #3b82f6; /* Mismo azul original */
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Invitación Gender Reveal</h1>

        <div class="composition-area">
            <div class="composition-grid">
                <img src="image_9.png" class="composition-item item-mixed-bear" alt="Oso con globos rosas y cafés">
                <img src="image_11.png" class="composition-item item-blue-bear" alt="Oso con globos azules">
                <img src="image_8.png" class="composition-item item-girl" alt="Bebé niña">
                <img src="image_10.png" class="composition-item item-boy" alt="Bebé niño">
            </div>
        </div>
        <p class="info">¿Te sumas a la emoción de descubrir si es niña o niño?</p>
        <p class="info">Sábado, 11 de Noviembre<br>4:00 PM</p>
        <p class="info">Lugar: Area de alberca [Lugar Ficticio]</p>

        <div class="button-group">
            <a href="tel:119795613787" class="btn btn-rsvp">Confirmar Asistencia</a>
            <a href="https://maps.apple.com/" class="btn btn-map">Ver Mapa</a>
        </div>
    </div>
</body>
</html>
